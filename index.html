<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M & K GLOBAL AUTOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    color:#f5d76e;
}

/* ===== HEADER IMAGE ===== */
header{
    text-align:center;
    padding:15px;
}

header img{
    width:100%;
    max-height:260px;
    object-fit:contain;
    background:#000;
}

header h1{
    margin:10px 0 5px;
}

header p{
    color:#fff;
    font-size:14px;
}

/* ===== BUTTONS ===== */
.buttons a{
    display:inline-block;
    margin:6px;
    padding:10px 16px;
    background:#f5d76e;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
}

/* ===== CLICKABLE PRODUCTS ===== */
.products{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    padding:15px;
    text-align:center;
}

.products button{
    padding:10px;
    background:#f5d76e;
    color:#000;
    border:none;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}

/* ===== FORM ===== */
.container{
    padding:15px;
}

form{
    background:#111;
    border:2px solid #f5d76e;
    padding:20px;
    border-radius:8px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:4px;
    border:none;
}

button.submit-btn{
    width:100%;
    margin-top:18px;
    padding:12px;
    background:#f5d76e;
    color:#000;
    border:none;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:15px;
    color:#fff;
    font-size:13px;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
<img src="https://raw.githubusercontent.com/allroundadvert/M-K-GLOBAL-AUTOS-/245ff13fbbade84acba743c73ce97952d8ca0ec7/.github/workflows/1775644012285.png" alt="M & K GLOBAL AUTOS">

<h1>M & K GLOBAL AUTOS</h1>
<p><b>Expert in Upgrading and Conversion Kits</b></p>
<p>Bonnet, Bumper, Full Light, Back Light, Fender, Grill, Side Mirror, Door and Accessories – Toyota & Lexus</p>

<div class="buttons">
<a href="https://wa.me/2347031336663">WHATSAPP</a>
<a href="https://www.tiktok.com/@markhenry880?_r=1&_t=ZS-95LCw9gaiEW">TIKTOK</a>
<a href="https://www.facebook.com/share/1CSsJwS6Sn/">FACEBOOK</a>
</div>
</header>

<!-- ===== CLICKABLE PRODUCTS ===== -->
<h2 style="text-align:center; color:#f5d76e; margin-top:20px;">Place Your Orders</h2>
<div class="products">
<button type="button" onclick="addSpec('Bonnet')">Bonnet</button>
<button type="button" onclick="addSpec('Bumper')">Bumper</button>
<button type="button" onclick="addSpec('Full Light')">Full Light</button>
<button type="button" onclick="addSpec('Back Light')">Back Light</button>
<button type="button" onclick="addSpec('Fender')">Fender</button>
<button type="button" onclick="addSpec('Grill')">Grill</button>
<button type="button" onclick="addSpec('Side Mirror')">Side Mirror</button>
<button type="button" onclick="addSpec('Door')">Door</button>
<button type="button" onclick="addSpec('Accessories')">Accessories</button>
<button type="button" onclick="addSpec('Toyota')">Toyota</button>
<button type="button" onclick="addSpec('Lexus')">Lexus</button>
</div>

<!-- ===== FORM ===== -->
<div class="container">
<form onsubmit="sendWhatsApp(); return false;">

<label>Customer Name</label>
<input type="text" id="cName" required>

<label>Phone Number</label>
<input type="tel" id="cPhone" required>

<label>Specifications</label>
<textarea id="cSpec" rows="4" placeholder="Click the buttons above to add products"></textarea>

<label>Home Delivery</label>
<select id="delivery">
<option>Yes</option>
<option>No</option>
</select>

<button type="submit" class="submit-btn">Submit via WhatsApp</button>

</form>
</div>

<footer>
© M & K GLOBAL AUTOS – Trusted Upgrading and Conversion Kits
</footer>

<script>
function addSpec(product){
    const specField = document.getElementById("cSpec");
    if(specField.value){
        specField.value += ', ' + product;
    } else {
        specField.value = product;
    }
}

function sendWhatsApp(){
    const name = document.getElementById("cName").value;
    const phone = document.getElementById("cPhone").value;
    const spec = document.getElementById("cSpec").value;
    const delivery = document.getElementById("delivery").value;

    const message = `Hello M & K GLOBAL AUTOS!%0A%0AI would like to place an order:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Specifications: ${spec}%0A
Home Delivery: ${delivery}%0A%0AThank you.`;

    window.open(`https://wa.me/2347031336663?text=${message}`, "_blank");
}
</script>

</body>
</html>
